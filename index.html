<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FauxSavant</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ── Menu principal ─────────────────────────────────────── -->
<div id="page-home" class="page active">
  <div class="container">
    <div class="home-header">
      <div class="logo">🎭</div>
      <h1>Faux<span>Savant</span></h1>
      
    </div>

    <div class="home-actions">
      <div class="card">
        <h3 style="margin-bottom:1rem">Créer une partie</h3>
        <label style="display:block;margin-bottom:.5rem;font-size:.9rem;color:var(--text-muted)">Ton pseudo</label>
        <input id="host-name" class="input" type="text" placeholder="Entre ton pseudo..." maxlength="20" />
        <button id="btn-create" class="btn btn-primary btn-full btn-lg" style="margin-top:1rem">
          Créer une partie
        </button>
      </div>

      <div class="divider">ou</div>

      <div class="card">
        <h3 style="margin-bottom:1rem">Rejoindre une partie</h3>
        <label style="display:block;margin-bottom:.5rem;font-size:.9rem;color:var(--text-muted)">Ton pseudo</label>
        <input id="join-name" class="input" type="text" placeholder="Entre ton pseudo..." maxlength="20" style="margin-bottom:.75rem" />
        <label style="display:block;margin-bottom:.5rem;font-size:.9rem;color:var(--text-muted)">Code de la partie</label>
        <input id="join-code" class="input code-input" type="text" placeholder="ABC123" maxlength="6" />
        <button id="btn-join" class="btn btn-ghost btn-full btn-lg" style="margin-top:1rem">
          → Rejoindre
        </button>
      </div>
    </div>

    
  </div>
</div>

<!-- ── Toast container ────────────────────────────────────── -->
<div id="toast-container"></div>

<script type="module" src="js/ui-home.js"></script>
</body>
</html>
