<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FauxSavant</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="data/img/logo.png" />
</head>
<body>

<!-- ── Menu principal ─────────────────────────────────────── -->
<div id="page-home" class="page active">
  <div class="container">
    <div class="home-header">
      <div class="logo"><img src="data/img/logo.png" alt="FauxSavant logo" width="72" height="72" /></div>
      <div class="title-image"><img src="data/img/titre.png" alt="FauxSavant" /></div>
      
    </div>

    <div class="home-actions">
      <div style="text-align:center;margin-bottom:1rem;">
        <div style="color:var(--text-muted);font-size:.95rem;margin-bottom:.4rem;">Votre pseudo</div>
        <input id="player-name" class="input" type="text" placeholder="Entre ton pseudo..." maxlength="20" style="max-width:360px;" />
      </div>

      <div class="card card-transparent">
        <button id="btn-create" class="btn btn-primary btn-full btn-lg" style="margin-top:1rem">
          Créer une partie
        </button>
      </div>

      <div class="divider">ou</div>

      <div class="card">
        <h3 style="margin-bottom:1rem">Rejoindre une partie</h3>
        <label style="display:block;margin-bottom:.5rem;font-size:.9rem;color:var(--text-muted)">Code de la partie</label>
        <input id="join-code" class="input code-input" type="text" placeholder="DE3423" maxlength="6" />
        <button id="btn-join" class="btn btn-ghost btn-full btn-lg" style="margin-top:1rem">
          → Rejoindre
        </button>
      </div>
    </div>

    
  </div>
</div>

<!-- ── Toast container ────────────────────────────────────── -->
<div id="toast-container"></div>

<script type="module" src="js/ui-home.js"></script>
</body>
</html>
